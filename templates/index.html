<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Report App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: none;
            background-color: #87CEEB; /* Light sky blue color */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .form-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 300px;
        }
        label {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            display: block;
            margin-bottom: 8px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 16px;
            box-sizing: border-box;
        }
        input[type="submit"] {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        input[type="submit"]:hover {
            background-color: #0056b3;
        }
        h1, p {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Weather Report App</h1>
        <p>Get the latest weather updates for your city.</p>
        <form action="/" method="post">
            <label for="">Enter your city name: </label>
            <input type="text" name="city" placeholder="City Name" required>
            <input type="submit" value="Get Weather">
        </form>
       
    </div>
</body>
</html>
